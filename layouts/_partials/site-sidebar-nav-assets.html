{{- /* 动态文档导航：扫描 content/posts/ 子目录，列出所有文章 */ -}}
{{- $posts := .Site.GetPage "/posts" -}}
{{- $sections := $posts.Sections -}}
{{- if $sections -}}
<template id="site-sidebar-nav-template">
  <aside class="aside-collection site-sidebar-nav" aria-label="文档导航">
    <div class="site-sidebar-nav__body">
      <nav>
        <ul class="collection-list">
          {{- range $section := $sections.ByTitle -}}
            {{- $count := len $section.Pages -}}
            <li class="collection-item collection-item--section">
              <details class="collection-details"{{ if hasPrefix $.RelPermalink $section.RelPermalink }} open{{ end }}>
                <summary class="collection-summary">
                  <a href="{{ $section.RelPermalink }}" class="site-sidebar-nav__link" title="{{ $section.Title }} ({{ $count }} 篇)">
                    <span class="site-sidebar-nav__name">{{ $section.Title }}</span>
                    <span class="site-sidebar-nav__count">{{ $count }}</span>
                  </a>
                </summary>
                <ul class="collection-list collection-list--nested">
                  {{- range $section.Pages.ByWeight -}}
                    <li class="collection-item">
                      <a href="{{ .RelPermalink }}" class="site-sidebar-nav__link site-sidebar-nav__link--article{{ if eq $.RelPermalink .RelPermalink }} active{{ end }}" title="{{ .Title }}">
                        <span class="site-sidebar-nav__name">{{ .LinkTitle }}</span>
                      </a>
                    </li>
                  {{- end -}}
                </ul>
              </details>
            </li>
          {{- end -}}
        </ul>
      </nav>
    </div>
  </aside>
</template>

<style>
  .site-sidebar-nav-host { display: block !important; }
  .site-sidebar-nav {
    flex: 0 0 clamp(13rem, 15vw, 18rem) !important;
    max-width: clamp(13rem, 15vw, 18rem) !important;
    transition: flex-basis 0.22s ease, max-width 0.22s ease;
    padding: 1rem 0.75rem;
    font-size: 0.88rem;
    border-right: 1px solid fixit-var(global-border-color);
  }
  .site-sidebar-nav .collection-list { list-style: none; padding: 0; margin: 0; }
  .site-sidebar-nav .collection-item { margin: 0; padding: 0; }
  .collection-item--section { margin-bottom: 0.25rem !important; }
  .collection-details > summary { list-style: none; cursor: pointer; }
  .collection-details > summary::-webkit-details-marker { display: none; }
  .collection-details > summary::marker { display: none; content: none; }
  .site-sidebar-nav__link {
    display: flex; align-items: center; justify-content: space-between;
    padding: 0.45rem 0.6rem; color: fixit-var(global-font-color);
    text-decoration: none; border-radius: 0.35rem; transition: background 0.15s ease;
  }
  .site-sidebar-nav__link:hover { background: fixit-var(secondary); color: fixit-var(global-link-hover-color); text-decoration: none; }
  .site-sidebar-nav__link.active { background: fixit-var(secondary); color: fixit-var(global-link-hover-color); font-weight: 600; }
  .site-sidebar-nav__link--article { padding: 0.3rem 0.6rem 0.3rem 1.4rem; font-size: 0.82rem; }
  .site-sidebar-nav__name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .site-sidebar-nav__count {
    font-size: 0.72rem; color: fixit-var(global-font-secondary-color);
    background: fixit-var(secondary); padding: 0.1rem 0.4rem;
    border-radius: 0.65rem; opacity: 0.75; min-width: 1rem; text-align: center;
  }
  .collection-list--nested { margin-left: 0 !important; }
  .site-sidebar-nav-is-collapsed { flex: 0 0 2.5rem !important; max-width: 2.5rem !important; overflow: hidden; }
  .site-sidebar-nav-is-collapsed .site-sidebar-nav__body { display: none; }
  .site-sidebar-nav-toggle { display: none; }
  @media (min-width: 681px) {
    .site-sidebar-nav-toggle {
      display: inline-flex; align-items: center; justify-content: center;
      width: 1.75rem; height: 1.75rem; margin: 0 0 0.5rem 0.1rem;
      border: 0; border-radius: 999px; color: inherit; background: transparent;
      cursor: pointer; font-size: 0.85rem;
    }
    .site-sidebar-nav-toggle:hover { color: var(--fi-single-link-color, #2d96bd); }
  }
  @media (max-width: 680px) { .site-sidebar-nav { display: none !important; } }
  main.fi-container:has(.home:not(.posts)) { align-items: flex-start !important; }
  main.fi-container:has(.site-sidebar-nav) { gap: clamp(0.75rem, 1.3vw, 1.25rem); }
  main.fi-container:has(.site-sidebar-nav) > .page { width: min(64vw, 68rem); max-width: 68rem; transition: width 0.22s ease, max-width 0.22s ease; }
  main.fi-container.site-sidebar-nav-collapsed > .page { width: min(78vw, 78rem); max-width: 78rem; }
</style>

<script>
  (function () {
    var template = document.getElementById('site-sidebar-nav-template');
    var main = document.querySelector('main.fi-container') || document.querySelector('main');
    if (!template || !main || main.querySelector('.site-sidebar-nav')) return;
    var nav = template.content.firstElementChild.cloneNode(true);
    var firstAside = main.querySelector(':scope > aside.aside-collection');
    if (firstAside && firstAside.children.length === 0) {
      firstAside.replaceWith(nav);
    } else {
      var anchor = main.querySelector(':scope > article, :scope > .page, :scope > section') || main.firstElementChild;
      main.insertBefore(nav, anchor);
    }
    nav.classList.add('site-sidebar-nav-host');
    var toggle = document.createElement('button');
    toggle.type = 'button';
    toggle.className = 'site-sidebar-nav-toggle';
    toggle.setAttribute('aria-label', '收起文档导航');
    toggle.setAttribute('aria-expanded', 'true');
    toggle.textContent = '\u276E';
    nav.insertBefore(toggle, nav.firstChild);
    var storageKey = 'site-sidebar-nav-collapsed';
    var setCollapsed = function (collapsed) {
      nav.classList.toggle('site-sidebar-nav-is-collapsed', collapsed);
      main.classList.toggle('site-sidebar-nav-collapsed', collapsed);
      toggle.setAttribute('aria-expanded', collapsed ? 'false' : 'true');
      toggle.setAttribute('aria-label', collapsed ? '展开文档导航' : '收起文档导航');
      toggle.textContent = collapsed ? '\u276F' : '\u276E';
    };
    setCollapsed(localStorage.getItem(storageKey) === 'true');
    toggle.addEventListener('click', function () {
      var collapsed = !nav.classList.contains('site-sidebar-nav-is-collapsed');
      localStorage.setItem(storageKey, String(collapsed));
      setCollapsed(collapsed);
    });
  })();
</script>
{{- end -}}
