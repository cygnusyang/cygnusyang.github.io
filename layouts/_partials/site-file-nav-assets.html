{{- $current := .RelPermalink -}}
{{- $sections := where .Site.Sections.ByWeight "Params.hiddenFromFileNav" "ne" true -}}
{{- if $sections -}}
<template id="site-file-nav-template">
  <div class="site-file-nav" data-current="{{ $current }}">
    <div class="site-file-nav__header">
      <span class="site-file-nav__title">文档导航</span>
      <button class="site-file-nav__toggle" type="button" aria-label="收起文档导航" aria-expanded="true" title="收起/展开导航">
        <span aria-hidden="true"></span>
      </button>
    </div>
    <nav class="site-file-nav__body" aria-label="文档导航">
      <ul class="site-file-nav__list site-file-nav__list--root">
        {{- range $sections -}}
          {{- partial "site-file-nav-node.html" (dict "Node" . "Current" $current "Level" 0) -}}
        {{- end -}}
      </ul>
    </nav>
  </div>
</template>

<style>
  .site-file-nav-host {
    display: block !important;
    flex: 0 0 20rem !important;
    max-width: 20rem !important;
    transition: flex-basis 0.2s ease, max-width 0.2s ease;
    color: var(--fi-global-font-color, inherit);
    border: 0 !important;
    border-radius: 0 !important;
    background: transparent !important;
    box-shadow: none !important;
    -webkit-backdrop-filter: none !important;
    backdrop-filter: none !important;
  }

  .site-file-nav-host > .collection-details {
    display: none;
  }

  .site-file-nav {
    overflow-wrap: break-word;
  }

  .site-file-nav__header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 0.5rem;
    margin-block: 0 0.5em;
  }

  .site-file-nav__title {
    font-size: var(--fi-toc-title-font-size, 0.875rem);
    font-weight: 700;
    text-transform: uppercase;
  }

  .site-file-nav__title::before {
    content: "|";
    font-weight: bolder;
    margin-right: 0.5em;
    position: relative;
    bottom: 2px;
    color: var(--fi-global-border-color, currentColor);
  }

  .site-file-nav__toggle {
    width: 1.75rem;
    height: 1.75rem;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    border: 0;
    border-radius: 50%;
    color: inherit;
    background: transparent;
    cursor: pointer;
  }

  .site-file-nav__toggle:hover {
    color: var(--fi-single-link-color, #2d96bd);
  }

  .site-file-nav__toggle > span::before {
    content: "";
    display: block;
    width: 0.55rem;
    height: 0.55rem;
    border-left: 2px solid currentColor;
    border-bottom: 2px solid currentColor;
    transform: rotate(45deg);
  }

  .site-file-nav__body {
    max-height: calc(100vh - 2 * var(--fi-header-height, 3.5rem));
    overflow: auto;
    padding: 0;
  }

  .site-file-nav__list {
    margin: 0;
    padding: 0;
    list-style: none;
  }

  .site-file-nav__list .site-file-nav__list {
    padding-left: 0.7rem;
  }

  .site-file-nav__summary {
    display: grid;
    grid-template-columns: 0.9rem minmax(0, 1fr) auto;
    align-items: center;
    gap: 0.2rem;
    min-height: 1.7rem;
    padding: 0;
    cursor: pointer;
  }

  .site-file-nav__summary:hover,
  .site-file-nav__link:hover {
    color: var(--fi-single-link-color, #2d96bd);
  }

  .site-file-nav__summary::-webkit-details-marker {
    display: none;
  }

  .site-file-nav__chevron::before {
    content: "";
    display: block;
    width: 0.42rem;
    height: 0.42rem;
    border-right: 2px solid currentColor;
    border-bottom: 2px solid currentColor;
    opacity: 0.45;
    transform: rotate(-45deg);
    transition: transform 0.15s ease;
  }

  .site-file-nav__details[open] > .site-file-nav__summary .site-file-nav__chevron::before {
    transform: rotate(45deg);
  }

  .site-file-nav__section-link,
  .site-file-nav__link {
    color: inherit;
    text-decoration: none;
  }

  .site-file-nav__section-link {
    min-width: 0;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    font-size: var(--fi-toc-content-font-size, 0.8rem);
    font-weight: 650;
  }

  .site-file-nav__count {
    color: var(--fi-global-font-secondary-color, #64748b);
    font-size: 0.75rem;
  }

  .site-file-nav__item {
    margin: 1px 0;
  }

  .site-file-nav__link {
    display: block;
    min-height: 1.5rem;
    padding: 0.18rem 0 0.18rem 1.6rem;
    font-size: var(--fi-toc-content-font-size, 0.8rem);
    line-height: 1.35;
  }

  .site-file-nav__link::before {
    content: "|";
    font-weight: bolder;
    margin-right: 0.5em;
    position: relative;
    bottom: 2px;
    color: var(--fi-single-link-color, #2d96bd);
  }

  .site-file-nav__link.is-active,
  .site-file-nav__section-link.is-active {
    color: var(--fi-single-link-color, #2d96bd);
    font-weight: 700;
  }

  .site-file-nav__link.is-active {
    color: var(--fi-single-link-color, #2d96bd);
  }

  .site-file-nav-host.site-file-nav-is-collapsed {
    flex-basis: 3rem !important;
    max-width: 3rem !important;
  }

  .site-file-nav-host.site-file-nav-is-collapsed > :not(.site-file-nav) {
    display: none !important;
  }

  .site-file-nav-host.site-file-nav-is-collapsed .site-file-nav__title,
  .site-file-nav-host.site-file-nav-is-collapsed .site-file-nav__body {
    display: none;
  }

  .site-file-nav-host.site-file-nav-is-collapsed .site-file-nav__header {
    justify-content: center;
  }

  .site-file-nav-host.site-file-nav-is-collapsed .site-file-nav__toggle > span::before {
    transform: rotate(225deg);
  }

  @media (max-width: 680px) {
    .site-file-nav-host {
      display: none !important;
    }
  }
</style>

<script>
  (function () {
    var template = document.getElementById('site-file-nav-template');
    var main = document.querySelector('main.fi-container') || document.querySelector('main');
    if (!template || !main || main.querySelector('.site-file-nav')) return;

    var nav = template.content.firstElementChild.cloneNode(true);
    var host = main.querySelector(':scope > aside.aside-collection');
    if (!host) {
      host = document.createElement('aside');
      host.className = 'aside-collection site-file-nav-aside';
      var anchor = main.querySelector(':scope > article, :scope > .page, :scope > section') || main.firstElementChild;
      main.insertBefore(host, anchor);
    }

    host.classList.add('site-file-nav-host');
    host.insertBefore(nav, host.firstChild);

    var active = nav.querySelector('[aria-current="page"]');
    if (active) {
      var parent = active.parentElement;
      while (parent && parent !== nav) {
        if (parent.tagName === 'DETAILS') parent.open = true;
        parent = parent.parentElement;
      }
      active.scrollIntoView({ block: 'nearest' });
    }

    var storageKey = 'site-file-nav-collapsed';
    var toggle = nav.querySelector('.site-file-nav__toggle');
    var setCollapsed = function (collapsed) {
      host.classList.toggle('site-file-nav-is-collapsed', collapsed);
      toggle.setAttribute('aria-expanded', collapsed ? 'false' : 'true');
      toggle.setAttribute('aria-label', collapsed ? '展开文档导航' : '收起文档导航');
    };

    setCollapsed(localStorage.getItem(storageKey) === 'true');
    toggle.addEventListener('click', function () {
      var collapsed = !host.classList.contains('site-file-nav-is-collapsed');
      localStorage.setItem(storageKey, String(collapsed));
      setCollapsed(collapsed);
    });
  })();
</script>
{{- end -}}
