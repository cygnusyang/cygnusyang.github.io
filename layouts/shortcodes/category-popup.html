{{- /* 动态生成分类分类标题栏
  遍历 content/posts/ 直接子目录，不硬编码任何目录名 */ -}}
{{- $posts := .Site.GetPage "/posts" -}}
{{- $sections := $posts.Sections -}}
{{- $pinned := .Page.Params.pinned_categories | default slice -}}

{{- if $sections -}}
<div class="category-header-row">
  <div class="home-section-header">
    <span class="home-section-header-icon">📝</span>
    <h2 class="home-section-header-title">文章<span class="home-section-header-count">分类浏览</span></h2>
  </div>
</div>

{{- end -}}
