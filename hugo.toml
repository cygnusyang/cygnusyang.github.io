baseURL = "https://cygnusyang.github.io/"
languageCode = "zh-CN"
title = "Cygnus Tech Blog"
theme = "FixIt"

# 时区
timeZone = "Asia/Shanghai"

# 开启 pygments 代码高亮
pygmentsUseClasses = true
pygmentsCodeFences = true
pygmentsCodefencesNumberInline = true

# 允许 markdown 中嵌入原始 HTML（首页卡片需要）
[markup.goldmark.renderer]
  unsafe = true

# 分页
[pagination]
  pagerSize = 10

# 构建设置
[build]
  writeStats = true

# ==================== FixIt 主题配置 ====================
[params]
  # 网站描述
  description = "技术 × 产品 × 机器人"
  [params.author]
    name = "Cygnus Yang"
    email = "ruohuyang@163.com"

  # 主题模式: light, dark, auto
  defaultTheme = "auto"

  # 显示阅读时间和字数统计
  showReadingTime = true
  showWordCount = true

  # 代码块配置
  [params.code]
    copy = true
    expand = false

  # 面包屑导航
  [params.breadcrumb]
    enable = true
    sticky = false
    showHome = true

  # 页面级配置 (FixIt 的 function/params.html 会合并 page.Params | site.Params.page)
  [params.page]
    # Collection 系列导航侧边栏
    collectionList = true
    collectionNavigation = true

    [params.page.toc]
      enable = true
      keepStatic = false
      auto = true
      position = "right"
      ordered = false
      startLevel = 2
      endLevel = 6

    # 捐赠打赏 (FixIt 内置 reward 系统)
    [params.page.reward]
      enable = true
      animation = true
      position = "after"
      mode = "static"
      comment = "如果这篇文章对你有帮助，欢迎请我喝杯咖啡 ☕"

      [params.page.reward.ways]
        wechatpay = "/images/wechatpay.jpg"
        alipay = "/images/alipay.jpg"

  # 首页信息
  [params.home]
    enable = true
    [params.home.posts]
      enable = false
    [params.home.profile]
      enable = true
      avatar = ""
      author = "Cygnus Yang"
      bio = "技术 × 产品 × 机器人 | 关注 AI 和软件工程"
      [params.home.profile.socials]
        github = "https://github.com/cygnusyang"

  # 搜索
  [params.search]
    enable = true
    type = "fuse"
    maxResultLength = 10

  # 分享按钮
  [params.share]
    enable = true
    platforms = ["github"]

  # Mermaid 图表：使用技术文档风格，避免默认 hand-drawn 斜线填充。
  [params.mermaid]
    themes = ["base", "base"]
    securityLevel = "loose"
    look = "classic"
    layout = "dagre"
    fontFamily = "Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif"

    [params.mermaid.themeVariables.light]
      background = "#ffffff"
      primaryColor = "#f8fafc"
      primaryBorderColor = "#2563eb"
      primaryTextColor = "#0f172a"
      secondaryColor = "#eef6ff"
      secondaryBorderColor = "#0ea5e9"
      secondaryTextColor = "#0f172a"
      tertiaryColor = "#fef3c7"
      tertiaryBorderColor = "#f59e0b"
      tertiaryTextColor = "#0f172a"
      lineColor = "#475569"
      textColor = "#0f172a"
      edgeLabelBackground = "#ffffff"
      clusterBkg = "#f8fafc"
      clusterBorder = "#cbd5e1"
      fontSize = "15px"

    [params.mermaid.themeVariables.dark]
      background = "#252627"
      primaryColor = "#1e293b"
      primaryBorderColor = "#38bdf8"
      primaryTextColor = "#e5e7eb"
      secondaryColor = "#172033"
      secondaryBorderColor = "#60a5fa"
      secondaryTextColor = "#e5e7eb"
      tertiaryColor = "#3b2f14"
      tertiaryBorderColor = "#fbbf24"
      tertiaryTextColor = "#f8fafc"
      lineColor = "#64748b"
      textColor = "#e5e7eb"
      edgeLabelBackground = "#252627"
      clusterBkg = "#1f2937"
      clusterBorder = "#475569"
      fontSize = "15px"

    [params.mermaid.flowchart]
      curve = "basis"
      htmlLabels = true
      nodeSpacing = 48
      rankSpacing = 64
      padding = 12

  # 使用 FixIt 自定义资源钩子注入站点侧边栏导航，不修改主题目录。
  [params.customPartials]
    assets = ["site-sidebar-nav-assets.html"]

  # 关闭主题默认的 RSS 社交图标
  [params.social]
    RSS = false

# 统计分析（支持多个统计服务同时使用）
[params.analytics]
  enable = true
  
  # Google Analytics 4
  [params.analytics.google]
    id = ""  # 请替换为你的 Google Analytics Measurement ID (格式: G-XXXXXXXXXX)
  
  # 百度统计
  [params.analytics.baidu]
    id = ""  # 请替换为你的百度统计代码 ID (格式: xxxxxxxx)

# 评论系统配置
[params.page.comment]
  enable = true
  
  # Waline 评论系统配置 (https://waline.js.org)
  [params.page.comment.waline]
    enable = true
    serverURL = ""  # 部署 Waline 后获取的地址，如：https://your-waline-app.vercel.app
    pageview = true
    emoji = [ "//unpkg.com/@waline/emojis@1.1.0/weibo", "//unpkg.com/@waline/emojis@1.1.0/qq", "//unpkg.com/@waline/emojis@1.1.0/bilibili" ]
    meta = [
      "nick",
      "mail",
      "link"
    ]
    requiredMeta = ["nick", "mail"]
    login = "enable"
    wordLimit = 0
    pageSize = 10
    imageUploader = false
    highlighter = true
    comment = true
    texRenderer = false
    search = false
    recaptchaV3Key = ""
    turnstileKey = ""
    reaction = false

