baseURL = "https://cygnusyang.github.io/"
languageCode = "zh-CN"
title = "Cygnus Tech Blog"
theme = "PaperMod"

# 时区
timeZone = "Asia/Shanghai"

# 开启 pygments 代码高亮
pygmentsUseClasses = true
pygmentsCodeFences = true
pygmentsCodefencesNumberInline = true

# 分页
paginate = 10

# 默认内容类型
defaultContentLanguage = "zh"
defaultContentLanguageInSubdir = false

# 构建设置
[build]
  writeStats = true

# 权限设置
[params]
  # 网站描述
  description = "技术 × 产品 × 机器人"
  author = "Cygnus Yang"
  email = "cygnusyang@proton.me"
  github = "cygnusyang"

  # 开启 RSS
  showRSS = true

  # 开启搜索
  enableSearch = true

  # 代码块复制按钮
  codeCopy = true

  # 显示阅读时间
  showReadingTime = true
  showWordCount = true

  # 显示分享按钮
  shareButtons = ["github", "linkedin"]

  # 开启默认暗黑模式
  # defaultTheme = "auto"

  # 显示首页信息
  [params.homeInfo]
    enabled = true
    name = "Cygnus Yang"
    avatar = ""
    description = "技术 × 产品 × 机器人 | 关注 AI 和软件工程"
    buttons = [
      { name = "文章", url = "/posts/" },
      { name = "GitHub", url = "https://github.com/cygnusyang" }
    ]

  # 社交链接
  [[params.socials]]
    name = "GitHub"
    url = "https://github.com/cygnusyang"
    icon = "fa-brands fa-github"

  # 侧边栏
  [params.toc]
    enabled = true
    keepInContent = false

# 菜单
[menu]
  [[menu.main]]
    identifier = "posts"
    name = "文章"
    url = "/posts/"
    weight = 1
  [[menu.main]]
    identifier = "openclaw"
    name = "OpenClaw"
    url = "/openclaw/"
    weight = 2
  [[menu.main]]
    identifier = "reading"
    name = "读书"
    url = "/reading/"
    weight = 3
  [[menu.main]]
    identifier = "about"
    name = "关于"
    url = "/about/"
    weight = 4

# 输出格式
[outputs]
  home = ["HTML", "RSS", "JSON"]
  section = ["HTML", "RSS"]
