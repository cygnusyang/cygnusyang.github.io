baseURL = "https://cygnusyang.github.io/"
languageCode = "zh-CN"
title = "Cygnus Tech Blog"
theme = "FixIt"

# 时区
timeZone = "Asia/Shanghai"

# 开启 pygments 代码高亮
pygmentsUseClasses = true
pygmentsCodeFences = true
pygmentsCodefencesNumberInline = true

# 分页
[pagination]
  pagerSize = 10

# 构建设置
[build]
  writeStats = true

# ==================== FixIt 主题配置 ====================
[params]
  # 网站描述
  description = "技术 × 产品 × 机器人"
  [params.author]
    name = "Cygnus Yang"
    email = "ruohuyang@163.com"

  # 主题模式: light, dark, auto
  defaultTheme = "auto"

  # 显示阅读时间和字数统计
  showReadingTime = true
  showWordCount = true

  # 代码块配置
  [params.code]
    copy = true
    expand = false

  # 面包屑导航
  [params.breadcrumb]
    enable = true
    sticky = false
    showHome = true

  # 页面级配置 (FixIt 的 function/params.html 会合并 page.Params | site.Params.page)
  [params.page]
    # Collection 系列导航侧边栏
    collectionList = true
    collectionNavigation = true

    [params.page.toc]
      enable = true
      keepStatic = false
      auto = true
      position = "right"
      ordered = false
      startLevel = 2
      endLevel = 6

  # 首页信息
  [params.home]
    enable = true
    [params.home.profile]
      enable = true
      avatar = ""
      author = "Cygnus Yang"
      bio = "技术 × 产品 × 机器人 | 关注 AI 和软件工程"
      [params.home.profile.socials]
        github = "https://github.com/cygnusyang"

  # 搜索
  [params.search]
    enable = true
    type = "lunr"
    maxResultLength = 10

  # 分享按钮
  [params.share]
    enable = true
    platforms = ["github"]

# 导航菜单
[menu]
  [[menu.main]]
    identifier = "posts"
    name = "文章"
    url = "/posts/"
    weight = 1
  [[menu.main]]
    identifier = "openclaw"
    name = "OpenClaw"
    url = "/posts/openclaw/"
    parent = "posts"
    weight = 2
  [[menu.main]]
    identifier = "reading"
    name = "读书"
    url = "/reading/"
    weight = 3
  [[menu.main]]
    identifier = "about"
    name = "关于"
    url = "/about/"
    weight = 4

# 输出格式
[outputs]
  home = ["HTML", "RSS", "JSON"]
  section = ["HTML", "RSS"]
