baseURL = "https://cygnusyang.github.io/"
languageCode = "zh-CN"
title = "Cygnus Tech Blog"
theme = "hextra"

# 时区
timeZone = "Asia/Shanghai"

enableRobotsTXT = true
enableGitInfo = true
hasCJKLanguage = true

# 代码高亮
[markup.highlight]
noClasses = false

[markup.goldmark.renderer]
unsafe = true

[markup.goldmark.extensions.passthrough]
delimiters.block = [['\[', '\]'], ['$$', '$$']]
delimiters.inline = [['\(', '\)']]
enable = true

enableInlineShortcodes = true

# 分页
[pagination]
  pagerSize = 10

# 构建设置
[build]
  writeStats = true

[module]
  [module.hugoVersion]
    extended = true
    min = "0.146.0"

# ==================== Hextra 主题配置 ====================
[params]
  description = "技术 × 产品 × 机器人 | 关注 AI 和软件工程"
  defaultContentLanguage = "zh-cn"
  externalLinkDecoration = true

  # 主题模式: light, dark, system
  [params.theme]
    default = "system"
    displayToggle = true

  # 导航栏
  [params.navbar]
    displayTitle = true
    displayLogo = false
    width = "wide"

  # 页脚
  [params.footer]
    enable = true
    displayCopyright = true
    displayPoweredBy = true
    width = "normal"

  # 显示最后修改日期
  displayUpdatedDate = true
  dateFormat = "2006年1月2日"
  displayUpdatedAuthor = false

  # 搜索
  [params.search]
    enable = true
    type = "flexsearch"
    [params.search.flexsearch]
      index = "content"
      tokenize = "forward"

  # 代码块配置
  [params.highlight]
    [params.highlight.copy]
      enable = true
      display = "hover"

  # 博客配置
  [params.blog]
    [params.blog.list]
      displayTags = true
      sortBy = "date"
      sortOrder = "desc"
      pagerSize = 10
    [params.blog.article]
      displayPagination = true

  # 归档配置
  [params.archives]
    section = "posts"
    dateFormat = "2006年1月"

  # 目录
  [params.toc]
    displayTags = true

  # 页面宽度
  [params.page]
    width = "normal"

  # 图片缩放
  [params.imageZoom]
    enable = true

  # 评论
  [params.comments]
    enable = false

# 导航菜单
[menu]
  [[menu.main]]
    identifier = "posts"
    name = "文章"
    pageRef = "/posts"
    weight = 1
  [[menu.main]]
    identifier = "openclaw"
    name = "OpenClaw"
    pageRef = "/posts/openclaw"
    parent = "posts"
    weight = 2
  [[menu.main]]
    identifier = "reading"
    name = "读书"
    pageRef = "/reading"
    weight = 3
  [[menu.main]]
    identifier = "about"
    name = "关于"
    pageRef = "/about"
    weight = 4
  [[menu.main]]
    name = "GitHub"
    weight = 5
    url = "https://github.com/cygnusyang"
    params.icon = "github"

[outputs]
  home = ["HTML", "RSS", "JSON"]
  section = ["HTML", "RSS"]
