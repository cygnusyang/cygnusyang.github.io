baseURL = "https://cygnusyang.github.io/"
languageCode = "zh-CN"
title = "Cygnus Tech Blog"
theme = "FixIt"

# 时区
timeZone = "Asia/Shanghai"

# 开启 pygments 代码高亮
pygmentsUseClasses = true
pygmentsCodeFences = true
pygmentsCodefencesNumberInline = true

# 允许 markdown 中嵌入原始 HTML（首页卡片需要）
[markup.goldmark.renderer]
  unsafe = true

# 分页
[pagination]
  pagerSize = 10

# 构建设置
[build]
  writeStats = true

# 输出压缩
[minify]
  disableSVG = false
  [minify.tdewolff]
    [minify.tdewolff.html]
      keepDocumentTags = true
      keepEndTags = true
      keepQuotes = false
      keepWhitespace = false
    [minify.tdewolff.js]
      keepVarNames = false
      precision = 0
    [minify.tdewolff.css]
      precision = 0

# ==================== FixIt 主题配置 ====================
[params]
  # 网站描述
  description = "技术 × 产品 × 机器人"
  [params.author]
    name = "Cygnus Yang"
    email = "ruohuyang@163.com"

  # 主题模式: light, dark, auto
  defaultTheme = "auto"

  # 显示阅读时间和字数统计
  showReadingTime = true
  showWordCount = true

  # 代码块配置
  [params.code]
    copy = true
    expand = false

  # 面包屑导航
  [params.breadcrumb]
    enable = true
    sticky = false
    showHome = true

  # 页面级配置 (FixIt 的 function/params.html 会合并 page.Params | site.Params.page)
  [params.page]
    # Collection 系列导航侧边栏
    collectionList = true
    collectionNavigation = true

    # 相关文章推荐
    [params.page.related]
      enable = true
      count = 5
      position = ["footer"]

    [params.page.toc]
      enable = true
      keepStatic = false
      auto = true
      position = "right"
      ordered = false
      startLevel = 2
      endLevel = 6

    # 捐赠打赏 (FixIt 内置 reward 系统)
    [params.page.reward]
      enable = true
      animation = true
      position = "after"
      mode = "static"
      comment = "如果这篇文章对你有帮助，欢迎请我喝杯咖啡 ☕"

      [params.page.reward.ways]
        wechatpay = "/images/wechatpay.jpg"
        alipay = "/images/alipay.jpg"

  # 首页信息
  [params.home]
    enable = true
    [params.home.posts]
      enable = false
    [params.home.profile]
      enable = true
      avatar = ""
      author = "Cygnus Yang"
      bio = "技术 × 产品 × 机器人 | 关注 AI 和软件工程"
      [params.home.profile.socials]
        github = "https://github.com/cygnusyang"

  # 搜索
  [params.search]
    enable = true
    type = "fuse"
    maxResultLength = 10
    contentLength = 1000
    anchorify = false
    summaryLength = 200

  # 分享按钮
  [params.share]
    enable = true
    platforms = ["github"]

  # Mermaid 图表：使用技术文档风格，避免默认 hand-drawn 斜线填充。
  [params.mermaid]
    themes = ["base", "base"]
    securityLevel = "loose"
    look = "classic"
    layout = "dagre"
    fontFamily = "Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif"

    [params.mermaid.themeVariables.light]
      background = "#ffffff"
      primaryColor = "#f8fafc"
      primaryBorderColor = "#2563eb"
      primaryTextColor = "#0f172a"
      secondaryColor = "#eef6ff"
      secondaryBorderColor = "#0ea5e9"
      secondaryTextColor = "#0f172a"
      tertiaryColor = "#fef3c7"
      tertiaryBorderColor = "#f59e0b"
      tertiaryTextColor = "#0f172a"
      lineColor = "#475569"
      textColor = "#0f172a"
      edgeLabelBackground = "#ffffff"
      clusterBkg = "#f8fafc"
      clusterBorder = "#cbd5e1"
      fontSize = "15px"

    [params.mermaid.themeVariables.dark]
      background = "#1a1b1c"
      primaryColor = "#1e3a5f"
      primaryBorderColor = "#58a6ff"
      primaryTextColor = "#f0f6fc"
      secondaryColor = "#2d1f5e"
      secondaryBorderColor = "#79c0ff"
      secondaryTextColor = "#f0f6fc"
      tertiaryColor = "#4a3000"
      tertiaryBorderColor = "#f0c040"
      tertiaryTextColor = "#fef3c7"
      lineColor = "#8b949e"
      textColor = "#f0f6fc"
      edgeLabelBackground = "#2d333b"
      clusterBkg = "#1c2333"
      clusterBorder = "#58a6ff"
      fontSize = "15px"

    [params.mermaid.flowchart]
      curve = "basis"
      htmlLabels = true
      nodeSpacing = 48
      rankSpacing = 64
      padding = 12

  # 使用 FixIt 自定义资源钩子注入站点侧边栏导航，不修改主题目录。
  [params.customPartials]
    assets = ["site-sidebar-nav-assets.html"]

  # 关闭主题默认的 RSS 社交图标
  [params.social]
    RSS = false

# 统计分析（支持多个统计服务同时使用）
[params.analytics]
  enable = true
  
  # Google Analytics 4
  [params.analytics.google]
    id = ""  # 请替换为你的 Google Analytics Measurement ID (格式: G-XXXXXXXXXX)
  
  # 百度统计
  [params.analytics.baidu]
    id = "ca9a2cee6f2d47d57d75201cf14c2e15"

# 评论系统配置
[params.page.comment]
  enable = true
  
  # Waline 评论系统配置 (https://waline.js.org/) - 支持匿名评论
  # 当前推荐使用 Supabase/PostgreSQL，并在 Vercel 配置 PG_* 或 POSTGRES_* 环境变量
  # 配置指南: SUPABASE_QUICKSTART.md / WALINE_TROUBLESHOOTING.md
  [params.page.comment.waline]
    enable = true  # 匿名评论已开启（昵称必填，邮箱可选）
    serverURL = "https://cygnus-blog-comments-3gbflut4g-cygnusyang-s-projects.vercel.app"  # 请填写你的 Waline 服务地址（如：https://your-waline.vercel.app）
    lang = "zh-CN"
    visitor = true  # 文章访问量统计
    emoji = ["https://cdn.jsdelivr.net/gh/walinejs/emojis@1.0.0/weibo"]  # 表情包
    requiredMeta = ["nick"]  # 必填字段：仅昵称，邮箱可选
    wordLimit = 0  # 评论字数限制（0 表示不限制）
    pageSize = 10  # 每页评论数
    imageUploader = false  # 图片上传功能
    highlighter = false  # 代码高亮
    texRenderer = false  # LaTeX 公式渲染
  
  # Giscus 评论系统配置 (https://giscus.app) - 需要 GitHub 账户登录
  # 基于 GitHub Discussions，无需服务器和数据库
  [params.page.comment.giscus]
    enable = false
    # GitHub 仓库信息
    repo = "cygnusyang/cygnusyang.github.io"  # 你的 GitHub Pages 仓库
    repoId = "R_kgDOSUhMhQ"  # Giscus 自动生成
    category = "General"  # Discussions 分类
    categoryId = "DIC_kwDOSUhMhc4C8Y8_"  # Giscus 自动生成
    # 映射方式
    mapping = "pathname"  # 使用文章路径作为标识
    # 其他配置
    strict = "0"  # 是否严格匹配
    reactionsEnabled = "1"  # 启用反应表情
    emitMetadata = "0"  # 是否发送元数据
    inputPosition = "bottom"  # 输入框位置
    lang = "zh-CN"  # 语言
    lightTheme = "https://cygnusyang.github.io/css/giscus/light.css"  # 匹配 FixIt 浅色
    darkTheme = "https://cygnusyang.github.io/css/giscus/dark.css"  # 匹配 FixIt 深色
    lazyLoad = true  # 懒加载

# 导航菜单
[menu]
  [[menu.main]]
    identifier = "posts"
    name = "文章"
    url = "/posts/"
    weight = 1
  [[menu.main]]
    identifier = "about"
    name = "关于"
    url = "/about/"
    weight = 2

# 输出格式
[outputs]
  home = ["HTML", "RSS", "JSON", "Search"]
  section = ["HTML", "RSS"]

# 分类法
[taxonomies]
  category = "categories"
  tag = "tags"
  collection = "collections"
  series = "series"

# 图片处理（为未来配图做准备）
[imaging]
  quality = 85
  resampleFilter = "CatmullRom"
  anchor = "Smart"

# 相关文章推荐（基于标签和分类的精准匹配）
[related]
  includeNewer = false
  threshold = 60
  toLower = false
  [[related.indices]]
    name = "tags"
    weight = 100
  [[related.indices]]
    name = "collections"
    weight = 80
  [[related.indices]]
    name = "keywords"
    weight = 50
  [[related.indices]]
    name = "date"
    weight = 10
