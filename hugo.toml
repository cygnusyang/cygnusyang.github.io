baseURL = "https://cygnusyang.github.io/"
languageCode = "zh-CN"
title = "Cygnus Tech Blog"
theme = "FixIt"

# 时区
timeZone = "Asia/Shanghai"

# 开启 pygments 代码高亮
pygmentsUseClasses = true
pygmentsCodeFences = true
pygmentsCodefencesNumberInline = true

# 分页
[pagination]
  pagerSize = 10

# 默认内容类型
defaultContentLanguage = "zh"
defaultContentLanguageInSubdir = false

# 构建设置
[build]
  writeStats = true

# ==================== FixIt 主题配置 ====================
[params]
  # 网站描述
  description = "技术 × 产品 × 机器人"
  author = "Cygnus Yang"
  email = "cygnusyang@proton.me"

  # 主题模式: light, dark, auto
  defaultTheme = "auto"

  # 显示阅读时间和字数统计
  showReadingTime = true
  showWordCount = true

  # 代码块配置
  [params.code]
    copy = true
    expand = false

  # 右侧目录
  [params.toc]
    enable = true
    # 目录浮动在右侧
    keepInContent = false

  # 首页信息
  [params.home]
    enable = true
    [params.home.profile]
      enable = true
      avatar = ""
      author = "Cygnus Yang"
      bio = "技术 × 产品 × 机器人 | 关注 AI 和软件工程"
      [params.home.profile.socials]
        github = "https://github.com/cygnusyang"

  # 搜索
  [params.search]
    enable = true
    type = "lunr"
    maxResultLength = 10

  # 分享按钮
  [params.share]
    enable = true
    platforms = ["github"]

# 多语言配置
[Languages]
  [Languages.zh]
    languageName = "中文"
    weight = 1
    title = "Cygnus Tech Blog"
    [Languages.zh.menu]
      [[Languages.zh.menu.main]]
        identifier = "posts"
        name = "文章"
        url = "/posts/"
        weight = 1
      [[Languages.zh.menu.main]]
        identifier = "openclaw"
        name = "OpenClaw"
        url = "/openclaw/"
        weight = 2
      [[Languages.zh.menu.main]]
        identifier = "reading"
        name = "读书"
        url = "/reading/"
        weight = 3
      [[Languages.zh.menu.main]]
        identifier = "about"
        name = "关于"
        url = "/about/"
        weight = 4

# 输出格式
[outputs]
  home = ["HTML", "RSS", "JSON"]
  section = ["HTML", "RSS"]
